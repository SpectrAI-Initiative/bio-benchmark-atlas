entity_type: benchmark
id: beacon-rna
name: BEACON
aliases: [Benchmark for Comprehensive RNA Tasks and Language Models, RNA BEACON]
summary: A 13-task RNA representation benchmark covering structure, function, processing, modification, translation, degradation, programmable switches, and CRISPR activity.
kind: suite
parent_id: null
organizations: [Shanghai Artificial Intelligence Laboratory, University of Sydney, University of Hong Kong, Fudan University]
release_date: '2024-06-14'
latest_version: neurips-2024
domains: [transcriptomics, genomics, molecular-cell-biology]
capabilities: [prediction, classification, regression]
modalities: [dna-rna-sequence]
task_formats: [sequence classification, nucleotide-level classification, sequence regression, nucleotide-level regression]
task_counts: &beacon-counts
  total: 13
  basis: formal RNA benchmark tasks
  reporting_status: reported
  subsets:
    - {id: beacon-structure, label: Structure tasks, count: 4, basis: formal RNA benchmark tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'SSP, CMP, DMP, and SSI.'}
    - {id: beacon-function, label: Function tasks, count: 5, basis: formal RNA benchmark tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'SPL, APA, ncRNA, Modif, and MRL.'}
    - {id: beacon-engineering, label: Engineering tasks, count: 4, basis: formal RNA benchmark tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'VDP, PRS, CRI-On, and CRI-Off.'}
coverage_notes:
  - {tag: transcriptomics, coverage: explicitly-in-scope, count: 13, reporting_status: reported, notes: 'All tasks consume RNA sequence and evaluate RNA structural, functional, or engineering outcomes.'}
  - {tag: genomics, coverage: explicitly-in-scope, count: 2, reporting_status: reported, notes: CRISPR on-target and off-target tasks involve guide and target sequence activity.}
access:
  level: fully-open
  tasks: The official repository links all 13 prepared datasets and publishes task scripts and model checkpoints.
  artifacts: Training code, tokenizers, RNA language-model adapters, checkpoints, and split-specific scripts are public.
  grader: Deterministic task-specific F1, precision, R-squared, accuracy, AUC, MCRMSE, and Spearman scorers.
  license: Apache-2.0 for code; underlying datasets have mixed public, research-only, and noncommercial terms documented in the paper.
  biosafety_notes: The paper notes general dual-use potential for RNA manipulation; this registry mirrors no sequences, checkpoints, or model outputs.
