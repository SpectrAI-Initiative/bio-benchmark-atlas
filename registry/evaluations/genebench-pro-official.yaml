scope:
  type: full
  n: 129
  subset_id: null
  filter: Complete formal 129-problem suite, including the 10 public, 50 Artificial Analysis, and 69 internal-holdout problems.
  reporting_status: reported
protocol:
  shots:
    value: null
    reporting_status: not_reported
    notes: The report enumerates the initial instructions but does not characterize the setup using a zero/few-shot convention.
  turns:
    value: multi-turn agent-container trajectory
    reporting_status: reported
    notes: Agents iteratively inspect files, execute analyses, and return a final JSON object.
  system_prompt_public:
    value: false
    reporting_status: reported
    notes: The task prompts for ten cases are public, but the full harness system message and 119 held-out prompts are not
      published.
  reasoning:
    value: provider-reported xhigh reasoning setting
    reporting_status: reported
    notes: Effort labels are provider-native configuration labels; no claim is made that equal labels imply equal token budgets
      across providers.
  tools:
    browser:
      value: false
      reporting_status: reported
      notes: The isolated workspace had no internet access.
    internet:
      value: false
      reporting_status: reported
      notes: Methods explicitly state that the execution environment had no internet access.
    databases:
      value: false
      reporting_status: reported
      notes: Agents were limited to staged local files, installed software, and model-internal knowledge.
    code_execution:
      value: true
      reporting_status: reported
      notes: Python and R analysis were available in the Linux environment.
    container:
      value: true
      reporting_status: reported
      notes: Runs used a Linux Docker container.
    external_tools:
      value:
      - Python/R scientific stacks
      - PLINK 2.0
      - bedtools/tabix
      - pysam/cyvcf2
      - scanpy/anndata
      - DESeq2/edgeR/limma
      reporting_status: reported
      notes: Representative installed packages; the paper provides the longer exact list.
  token_budget:
    value: null
    reporting_status: not_reported
    notes: No uniform token budget is reported. Supplementary Table 1 reports observed average tokens only for mainline GPT-family
      configurations.
  time_budget:
    value: No additional uniform wall-clock budget imposed by the harness
    reporting_status: reported
    notes: Runs remained subject to provider and platform behavior.
  temperature:
    value: null
    reporting_status: not_reported
    notes: Not reported.
  seed:
    value: null
    reporting_status: not_reported
    notes: Not reported.
  repeats:
    value: 10
    reporting_status: reported
    notes: 10 independent attempts per model–problem pair were scheduled; invalid container, tooling, provider, or response-format
      attempts were excluded.
  grader:
    type: problem-specific Python binary checker requiring every graded field to satisfy exact-match or absolute-tolerance
      constraints
    model: null
    human_review: false
    reporting_status: reported
  statistical:
    value: unweighted mean of 129 per-problem pass rates with a 95% hierarchical bootstrap CI from 20,000 resamples of problems
      and repeated runs
    reporting_status: reported
    notes: Per-problem rates use the final valid attempts; no partial credit. The free-text reasoning field is collected but
      not graded.
  contamination:
    value: constructively simulated suite with disjoint 10 public, 50 Artificial Analysis, and 69 internal-holdout release
      strata
    reporting_status: reported
    notes: The full reported evaluation includes every release stratum.
metrics:
- metric_id: pass-rate
  source_label: Eval-level pass rate
  unit: percent
  range:
  - 0
  - 100
  higher_is_better: true
  aggregation: unweighted mean across 129 problem-level pass rates; each problem-level rate is passing valid attempts divided
    by valid attempts
  pass_threshold: null
  tolerance: A problem attempt passes only when all graded fields satisfy their problem-specific exact-match rules or absolute
    numeric tolerances.
