entity_type: evaluation_run
id: biomysterybench-official-run
work_id: biomysterybench-official
benchmark_id: biomysterybench
benchmark_version: v8
model_ids:
- claude-haiku-4-5
- claude-sonnet-4-6
- claude-opus-4-6
- claude-opus-4-7
- claude-mythos-preview
scope:
  type: full
  n: 99
  subset_id: null
  filter: Initial v8 release used by the April report; four failed-QC human-difficult candidates had already been excluded before the 99-problem benchmark was formed.
  reporting_status: reported
protocol:
  shots:
    value: null
    reporting_status: not_reported
    notes: The report does not characterize the agent setup using a zero-shot or few-shot convention.
  turns:
    value: multi-turn agent episode
    reporting_status: reported
    notes: Each run is an open-ended tool-using trajectory ending in a final answer.
  system_prompt_public:
    value: null
    reporting_status: not_reported
    notes: Problem questions and v11 answer rubrics are released, but the report does not publish or state the availability of the evaluation system prompt.
  reasoning:
    value: null
    reporting_status: not_reported
    notes: Model-specific reasoning or effort settings are not reported.
  tools:
    browser:
      value: null
      reporting_status: not_reported
      notes: A browser interface is not reported.
    internet:
      value: allowlisted external access
      reporting_status: reported
      notes: Agents could access canonical bioinformatics databases and download references; reverse-identifying source datasets through accession lookup was prohibited.
    databases:
      value:
      - NCBI
      - Ensembl
      - other canonical bioinformatics databases allowed per problem
      reporting_status: reported
      notes: Standard database uses such as gene lookup, sequence annotation, reference-genome download, and BLAST were permitted.
    code_execution:
      value: true
      reporting_status: reported
      notes: The environment supports analysis code and command-line bioinformatics workflows.
    container:
      value: true
      reporting_status: reported
      notes: Every model episode ran in a container initialized with a minimal canonical tool set.
    external_tools:
      value: preinstalled canonical bioinformatics tools plus packages installable through pip and conda
      reporting_status: reported
      notes: The exact base image and complete package inventory are not published.
  token_budget:
    value: null
    reporting_status: not_reported
    notes: Not reported.
  time_budget:
    value: null
    reporting_status: not_reported
    notes: Not reported.
  temperature:
    value: null
    reporting_status: not_reported
    notes: Not reported.
  seed:
    value: null
    reporting_status: not_reported
    notes: Not reported.
  repeats:
    value: 5
    reporting_status: reported
    notes: Each model attempted every problem in five independent episodes.
  grader:
    type: objective final-answer scoring against an expert-authored answer rubric
    model: null
    human_review: null
    reporting_status: reported
  statistical:
    value: accuracy averaged over five episodes per problem with error bars from bootstrap sampling within problems; per-problem reliability analyzed by 0-of-5 through 5-of-5 solve counts
    reporting_status: reported
    notes: The report does not publish numeric confidence bounds, the number of bootstrap resamples, or the exact grader implementation.
  contamination:
    value: source-dataset reverse identification prohibited; accession-ID leaks scrubbed from 16 v8 problems
    reporting_status: reported
    notes: This is an anti-cheating/data-leak control, not a reported pretraining-contamination analysis.
metrics:
- metric_id: episode-accuracy
  source_label: Accuracy
  unit: percent
  range: [0, 100]
  higher_is_better: true
  aggregation: mean over five trials per problem, then mean over the selected problems
  pass_threshold: null
  tolerance: expert-authored answer rubric
results: []
comparability_group: biomysterybench-v8-full-five-episodes-protocol
verification:
  status: verified
  last_verified: '2026-07-21'
  notes: Full v8 scope and common protocol are retained here; numeric results are split into separate 76- and 23-problem runs because the report publishes those subsets separately.
