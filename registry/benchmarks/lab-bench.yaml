coverage_notes:
- tag: protein-sequence
  coverage: explicitly-in-scope
  count: null
  reporting_status: not_reported
  notes: SeqQA and two ClinVar DbQA tasks require DNA/protein-sequence reasoning, but the sources do not publish a protein-only
    question count.
- tag: protein-protein-binding
  coverage: explicitly-in-scope
  count: 50
  reporting_status: reported
  notes: The Viral PPI formal task has 50 questions about predicted viral–human protein interactions.
- tag: protein-design
  coverage: not-in-scope
  count: 0
  reporting_status: reported
  notes: Primer and cloning design are in scope; protein sequence design is not a released LAB-Bench task.
access:
  level: partially-open
  tasks: 1,967 questions are public and 490 question contents are withheld; all 2,457 IDs and split membership are versioned.
  artifacts: Public questions, figures, tables, open-answer variants, split manifests, and the Python harness are released.
  grader: The official harness scores accuracy, precision/selective accuracy, coverage, and total n from exact single-choice
    outputs.
  license: CC-BY-SA-4.0
  biosafety_notes: The suite includes molecular-cloning and viral-PPI questions. BioBench Atlas stores only metadata and aggregate
    results and does not mirror questions or private content.
