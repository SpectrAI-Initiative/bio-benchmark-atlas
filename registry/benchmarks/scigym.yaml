entity_type: benchmark
id: scigym
name: SCIGYM
aliases: [SciGym SBML]
summary: An agentic systems-biology suite in which language models iteratively perturb simulated SBML systems, analyze time-series observations in Python, and reconstruct hidden biological reactions.
kind: suite
parent_id: null
organizations: [University of Toronto, SickKids, Axiom, Mila, Vector Institute]
release_date: '2025-05-16'
latest_version: 2025 release
domains: [life-science, molecular-cell-biology, bioinformatics]
capabilities: [experiment-planning, data-analysis, coding, tool-use, scientific-reasoning]
modalities: [text, table, code]
task_formats: [interactive simulated experiment, SBML reaction-network reconstruction]
task_counts: &current-counts
  total: 350
  basis: distinct curated BioModels systems released as SBML benchmark instances
  reporting_status: reported
  subsets:
  - {id: scigym-small-systems, label: Small systems, count: 137, basis: systems with fewer than 10 reactions in the evaluated small split, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'All six creator-paper models were evaluated on this split.'}
  - {id: scigym-large-systems, label: Large systems, count: 213, basis: remaining released systems with up to 400 reactions in the large split, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'Released by the creators but not evaluated in the paper.'}
coverage_notes:
- {tag: molecular-cell-biology, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'The source systems include signaling, metabolic, regulatory, and other biological processes, but the creators do not publish a mutually exclusive molecular/cell-biology count.'}
- {tag: genomics, coverage: unknown, count: null, reporting_status: not_reported, notes: 'Gene-regulatory networks are named as an example system class, but no official task-level genomics count is published and the benchmark does not use genomic sequence data.'}
- {tag: transcriptomics, coverage: not-in-scope, count: 0, reporting_status: reported, notes: 'The paper motivates the task by analogy to Perturb-seq and spatial transcriptomics, but SCIGYM inputs are SBML systems and simulated concentration trajectories rather than transcriptomic measurements.'}
- {tag: single-cell, coverage: not-in-scope, count: 0, reporting_status: reported, notes: 'No single-cell measurement is an official benchmark input or target.'}
- {tag: protein-design, coverage: not-in-scope, count: 0, reporting_status: reported, notes: 'Agents reconstruct reaction networks; they do not design or optimize protein sequences or structures.'}
- {tag: protein-protein-binding, coverage: not-in-scope, count: 0, reporting_status: reported, notes: 'Species can represent proteins, but no task evaluates protein-protein binding prediction or affinity.'}
- {tag: protein-ligand-binding, coverage: not-in-scope, count: 0, reporting_status: reported, notes: 'No task evaluates protein-ligand binding prediction or affinity.'}
access:
  level: fully-open
  tasks: All 350 partial/reference SBML systems and SED-ML simulation configurations are publicly downloadable in 137-system small and 213-system large splits.
  artifacts: The creators publish the benchmark data, 2,466 main-evaluation trajectories/final models, prompts, agent environment, and metric code; the repositories and dataset cards do not state redistribution licenses.
  grader: Public deterministic code computes network-topology F1, reaction-matching precision/recall/F1 with and without modifiers, and SMAPE-based simulation trajectory error.
  license: null
  biosafety_notes: SCIGYM exposes de-identified computational models and simulated concentration trajectories, not live materials, pathogen sequences, or wet-lab execution instructions; no separate creator biosafety restriction is reported.
