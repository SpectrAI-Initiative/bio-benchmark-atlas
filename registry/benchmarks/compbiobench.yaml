coverage_notes:
- tag: protein-structure
  coverage: observed
  count: 1
  reporting_status: reported
  notes: The official v1 TSV contains one Structure-domain PDB projection task; this is not a protein-folding or binding benchmark.
- tag: protein-protein-binding
  coverage: unknown
  count: null
  reporting_status: not_reported
  notes: No standalone protein-protein binding category or count is reported.
- tag: protein-ligand-binding
  coverage: unknown
  count: null
  reporting_status: not_reported
  notes: No standalone protein-ligand binding category or count is reported.
access:
  level: partially-open
  tasks: All 100 v1 questions and their metadata are open on Zenodo and Hugging Face.
  artifacts: The versioned Zenodo record provides a 12,001,320,960-byte input-data archive and a 100-row TSV; a commit-pinned Hugging Face mirror exposes the task files individually.
  grader: The public leaderboard scores whitespace-stripped exact string matches, but ground-truth answers and the evaluation backend are private; the public runner executes agents and extracts answers without grading them.
  license: CC BY 4.0 for the dataset; MIT for the runner; Apache-2.0 for the leaderboard Space; CC BY-NC 4.0 for the preprint
  biosafety_notes: The registry mirrors no task data or answers. The creators use synthetic/augmented data and scrubbed metadata to prevent lookup shortcuts; source-resource terms still apply.
