name: Deploy Pages

on:
  workflow_run:
    workflows: [Validate]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # A completed Validate run on a PR also starts this workflow before the build
  # job is skipped. Keep those wrapper runs from cancelling a main deployment.
  group: pages-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: {ref: '${{ github.event.workflow_run.head_sha }}'}
      - uses: actions/setup-python@v7
        with: {python-version: '3.10', cache: pip}
      - uses: pnpm/action-setup@v6
        with: {version: 10.12.1}
      - uses: actions/setup-node@v7
        with: {node-version: '24', cache: pnpm}
      - run: python -m pip install -e .
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with: {path: site/dist}
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
