  tasks: Both benchmark suites, standardized ChEMBL-derived train/validation/test files, and the holdout set are public.
  artifacts: The official package provides scorers; a companion creator repository provides baselines and a Docker environment.
  grader: Deterministic validity, uniqueness, novelty, KL, FCD, and goal-directed scoring functions with scores normalized to higher-is-better.
  license: MIT for GuacaMol code; the standardized molecular data derive from ChEMBL and retain applicable ChEMBL terms.
  biosafety_notes: The benchmark optimizes drug-like small molecules; this registry mirrors no molecular datasets or generated compounds.
