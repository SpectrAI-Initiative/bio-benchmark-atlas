coverage_notes:
- tag: proteomics
  coverage: explicitly-in-scope
  count: 7
  reporting_status: reported
  notes: Seven primary-domain problems are assigned to Proteomics; proteomics also appears in cross-domain problems.
- tag: protein-protein-binding
  coverage: unknown
  count: null
  reporting_status: not_reported
  notes: The domain atlas covers proteomics and biomarkers but does not define or count protein-binding problems separately.
access:
  level: partially-open
  tasks: Ten externally reviewed problems are fully public; a disjoint 50-problem Artificial Analysis subset and 69-problem
    internal holdout are not public.
  artifacts: The ten public packages include solver prompts, staged data, ground truth, problem-specific grader configuration,
    checksums, and detailed case-study reports.
  grader: A Python reference grader is public for the ten released case studies; the full 129-problem evaluation packages
    and grader targets remain held out.
  license: MIT (root LICENSE); CC-BY-4.0 (Hugging Face dataset-card metadata)
  biosafety_notes: Problems use constructively simulated data and synthetic labels. BioBench Atlas stores metadata and aggregate
    results only and does not mirror task data.
