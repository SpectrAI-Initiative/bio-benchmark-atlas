  total: 9
  basis: benchmark dataset classification tasks
  reporting_status: reported
  subsets:
    - {id: genomic-benchmarks-core-regulatory, label: Core regulatory-element datasets, count: 6, basis: benchmark dataset classification tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Drosophila enhancer plus five human regulatory datasets.}
    - {id: genomic-benchmarks-demo, label: Demonstration datasets, count: 2, basis: benchmark dataset classification tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Coding-versus-intergenic and human-versus-worm demos.}
