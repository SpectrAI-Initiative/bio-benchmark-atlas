  reasoning: {value: null, reporting_status: not_reported, notes: Model-specific reasoning or effort settings are not reported.}
  tools:
    browser: {value: null, reporting_status: not_reported, notes: A browser interface is not reported.}
    internet: {value: allowlisted external access, reporting_status: reported, notes: Canonical bioinformatics resources were allowed; source-dataset reverse lookup was prohibited.}
    databases: {value: canonical bioinformatics databases including NCBI and Ensembl, reporting_status: reported, notes: Reference downloads and standard bioinformatics queries were permitted.}
    code_execution: {value: true, reporting_status: reported, notes: Analysis code and command-line workflows were supported.}
    container: {value: true, reporting_status: reported, notes: Each episode used a container with canonical bioinformatics tools.}
    external_tools: {value: preinstalled tools plus packages installable through pip and conda, reporting_status: reported, notes: Exact inventory not reported.}
  token_budget: {value: null, reporting_status: not_reported, notes: Not reported.}
  time_budget: {value: null, reporting_status: not_reported, notes: Not reported.}
  temperature: {value: null, reporting_status: not_reported, notes: Not reported.}
  seed: {value: null, reporting_status: not_reported, notes: Not reported.}
  repeats: {value: 5, reporting_status: reported, notes: Five independent episodes per model and problem.}
  grader: {type: objective final-answer scoring against an expert-authored answer rubric, model: null, human_review: null, reporting_status: reported}
  statistical: {value: accuracy averaged over five episodes per problem with error bars from bootstrap sampling within problems; per-problem reliability also reported by 0-of-5 through 5-of-5 solve counts, reporting_status: reported, notes: Numeric confidence bounds and bootstrap-resample count are not published.}
  contamination: {value: source-dataset reverse identification prohibited; accession-ID leaks scrubbed from 16 v8 problems, reporting_status: reported, notes: Anti-cheating control; no pretraining-contamination analysis is reported.}
metrics:
- metric_id: episode-accuracy
  source_label: Accuracy — human-difficult
  unit: percent
  range: [0, 100]
  higher_is_better: true
  aggregation: mean over five episodes per problem, then mean over 23 problems
  pass_threshold: null
  tolerance: expert-authored answer rubric
