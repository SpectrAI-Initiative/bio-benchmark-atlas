# Evidence-backed Scientific Task mappings for this curation area.
classifications:
  genebench-pro:
    status: partial
    benchmark_version: paper-v1
    as_of: null
    notes: Official primary domains and task styles are not an exhaustive scientific-task taxonomy.
    entries:
    - task_type_id: end-to-end-computational-analysis
      coverage: explicitly-in-scope
      mapping_method: official-taxonomy
      confidence: high
      count: 129
      count_unit: problems
      count_basis: self-contained synthetic scientific-analysis problems (called evaluations in the paper abstract)
      count_ref: /task_counts/total
      reporting_status: reported
      evidence_ids:
      - genebench-pro-paper-evidence
      notes: Problems require multistage analysis, diagnostics, and judgment.
    - task_type_id: omics-cellular-analysis
      coverage: explicitly-in-scope
      mapping_method: official-taxonomy
      confidence: high
      count: null
      count_unit: problems
      count_basis: Problems assigned to transcriptomics, epigenomics, single-cell, spatial, proteomics, microbiome, and related
        official domains.
      count_ref: null
      reporting_status: not_reported
      evidence_ids:
      - genebench-pro-paper-evidence
      notes: The official domain atlas supports broad omics coverage but not an exhaustive leaf-task subtotal.
  biomysterybench:
