    label: legacy-multicategory
    status: superseded
    release_date: '2012-01-01'
    as_of: '2025-04-05'
    task_counts: {total: null, basis: 'rolling targets across now-discontinued single-chain 3D, quality-estimation, contact-prediction, and ligand-binding-site categories', reporting_status: not_reported, subsets: []}
    formal_tracks: []
    notes: 'The archive states that the old single-chain 3D category ended in April 2025; QE, CP, and LB are also discontinued.'
    evidence_ids: [cameo-evidence-origin, cameo-evidence-legacy]
  - id: cameo-2024-complex-study
    label: 2024-complex-study
    status: superseded
    release_date: '2024-01-06'
    as_of: '2024-11-30'
    task_counts:
      total: 7150
      basis: selected interesting complete PDB entries in the creator-paper study window
      reporting_status: reported
      subsets:
        - {id: cameo-2024-medium, label: Medium complete-complex targets, count: 1332, basis: selected PDB entries, exclusive: true, exhaustive: true, reporting_status: reported, notes: null}
        - {id: cameo-2024-hard, label: Hard complete-complex targets, count: 1981, basis: selected PDB entries, exclusive: true, exhaustive: true, reporting_status: reported, notes: null}
        - {id: cameo-2024-ligand, label: Ligand complete-complex targets, count: 3837, basis: selected PDB entries, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'Easy complexes containing a ligand novel relative to their easy templates.'}
        - {id: cameo-2024-ligand-plinder-mapped, label: Ligand targets mapped to PLINDER, count: 3615, basis: targets, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Corresponds to 9,459 ligands after excluding 222 targets from the mapping analysis.'}
        - {id: cameo-2024-ligand-baseline-common, label: Ligand baseline common subset, count: 2584, basis: targets predicted by all four baseline servers, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Contains 6,152 non-polymer entities.'}
        - {id: cameo-2024-ppi-after-monomer-exclusion, label: Protein-protein targets after monomer exclusion, count: 2078, basis: medium/hard protein-only targets, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Derived from 2,775 medium/hard targets after excluding 697 monomers.'}
        - {id: cameo-2024-antibody-candidates, label: Antibody targets, count: 525, basis: protein-protein targets mapped to SAbDab, exclusive: false, exhaustive: false, reporting_status: reported, notes: null}
        - {id: cameo-2024-homomer-candidates, label: Homomer targets, count: 836, basis: protein-protein targets, exclusive: false, exhaustive: false, reporting_status: reported, notes: null}
        - {id: cameo-2024-heteromer-candidates, label: Non-antibody heteromer targets, count: 717, basis: protein-protein targets, exclusive: false, exhaustive: false, reporting_status: reported, notes: null}
        - {id: cameo-2024-ppi-three-server-common, label: Protein-protein three-server common subset, count: 392, basis: 'targets predicted by AlphaFold 3, MultiFOLD, and SWISS-MODEL', exclusive: false, exhaustive: false, reporting_status: reported, notes: null}
        - {id: cameo-2024-antibody-three-server-common, label: Antibody targets in the three-server common subset, count: 83, basis: common-subset targets, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'The paper reports that 61 of these 83 antibody targets have one protein chain per entity.'}
    formal_tracks: []
    notes: 'A bounded creator-paper snapshot; it is not an all-time CAMEO total.'
    evidence_ids: [cameo-evidence-2024-study]
  - id: cameo-current-complex-3d
    label: current-complex-3d
    status: rolling
    release_date: null
    as_of: '2026-07-21'
    task_counts: {total: null, basis: selected complete PDB entries accumulated by an unbounded weekly rolling service, reporting_status: not_reported, subsets: []}
    formal_tracks: []
    notes: 'Current single category: complex structures modeling (3D). Counts change weekly and no fixed all-time snapshot is asserted.'
    evidence_ids: [cameo-evidence-current-help]
