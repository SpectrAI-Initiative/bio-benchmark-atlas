access:
  level: partially-open
  tasks: A five-problem preview is open; the current 90-problem full set is gated behind evaluation-only terms that prohibit training, fine-tuning, reinforcement, or distillation use.
  artifacts: The preview includes 11 MB of anonymized data. The gated full release lists per-problem archives totaling about 155 GB and permits inference-time evaluation after accepting its conditions.
  grader: Answer rubrics are included in the released problem tables and v11 specifies all-or-nothing scoring, but no executable official grading harness is published.
  license: CC BY 4.0 for problem statements, answer rubrics, and task formulation; data archives retain the original repositories' data-use policies and the full set has evaluation-only access conditions
  biosafety_notes: This registry mirrors no biological data, answers, or task files. The official materials describe anonymization and anti-lookup rules but do not publish a separate biosafety classification.
