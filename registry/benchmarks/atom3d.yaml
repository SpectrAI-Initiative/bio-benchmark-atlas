entity_type: benchmark
id: atom3d
name: ATOM3D
aliases: [Tasks On Molecules in Three Dimensions]
summary: A living collection of eight curated 3D molecular-learning tasks spanning small molecules, protein interactions and mutations, ligand binding, and protein/RNA structure ranking.
kind: suite
parent_id: null
organizations: [Stanford University]
release_date: '2020-12-07'
latest_version: v0.2.6
domains: [protein-structure, protein-protein-binding, protein-ligand-binding, medchem]
capabilities: [prediction, classification, regression]
modalities: [structure-3d]
task_formats: [3D molecular regression, 3D molecular classification, residue classification, structure ranking]
task_counts: &atom3d-counts
  total: 8
  basis: curated 3D benchmark datasets
  reporting_status: reported
  subsets: []
coverage_notes:
  - {tag: protein-protein-binding, coverage: explicitly-in-scope, count: 1, reporting_status: reported, notes: Protein Interface Prediction is one of the eight official datasets.}
  - {tag: protein-ligand-binding, coverage: explicitly-in-scope, count: 2, reporting_status: reported, notes: Ligand Binding Affinity and Ligand Efficacy Prediction are distinct official datasets.}
  - {tag: protein-structure, coverage: explicitly-in-scope, count: 3, reporting_status: reported, notes: 'Residue Identity, Mutation Stability Prediction, and Protein Structure Ranking operate on protein structures; their task semantics remain distinct.'}
access:
  level: fully-open
  tasks: All eight raw and prescribed-split datasets are publicly downloadable from the project site and Zenodo.
  artifacts: The official Python package publishes standardized LMDB loaders, split utilities, and task-specific model examples.
  grader: Deterministic MAE/RMSE, AUROC, accuracy, and rank-correlation evaluation depending on task.
  license: MIT for code; datasets retain their original source licenses and citation requirements.
  biosafety_notes: The suite contains public biomolecular structures and activity labels; this registry mirrors none of them.
