coverage_notes:
  - {tag: protein-design, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'The paper dataset card names Protein design as a possible benchmark task, but the released evaluation file has no topical category field, so no design-question count is inferred.'}
  - {tag: protein-sequence, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'The paper claims sequence-understanding coverage, but the current evaluation JSON exposes only question, options, answer, and explanation text fields and contains no explicit raw-sequence input field.'}
  - {tag: protein-protein-binding, coverage: observed, count: null, reporting_status: not_reported, notes: 'Official questions discuss protein-protein interactions and antibody binding, but no official topical labels support a standalone count.'}
  - {tag: protein-ligand-binding, coverage: observed, count: null, reporting_status: not_reported, notes: 'Official questions discuss ligand binding, but no official topical labels support a standalone count.'}
access:
  level: fully-open
  tasks: The complete evaluation JSON and CSV are publicly downloadable without gating from the creator Hugging Face repository.
  artifacts: Each record contains question, options, correct-answer label, and explanation; the current snapshot has no topical-category or raw-sequence field.
  grader: The official runner extracts the first integer from a response and compares it exactly with the answer-option integer.
  license: Apache-2.0 on the current Hugging Face dataset card and official code repository; the paper dataset card separately says Toursun Synbio metadata are CC BY 4.0.
  biosafety_notes: 'Questions cover protein science and engineering literature. The registry mirrors no questions, answer explanations, sequences, training corpora, or model outputs.'
