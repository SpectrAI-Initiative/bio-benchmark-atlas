name: Paper intake

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

jobs:
  authorize:
    if: contains(github.event.issue.labels.*.name, 'paper-intake') || contains(github.event.issue.labels.*.name, 'paper-candidate')
    runs-on: ubuntu-latest
    outputs:
      run_intake: ${{ steps.policy.outputs.run_intake }}
      discovered: ${{ steps.policy.outputs.discovered }}
      app_ready: ${{ steps.config.outputs.app_ready }}
      api_ready: ${{ steps.config.outputs.api_ready }}
    steps:
      - id: policy
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          IS_INTAKE: ${{ contains(github.event.issue.labels.*.name, 'paper-intake') }}
          IS_CANDIDATE: ${{ contains(github.event.issue.labels.*.name, 'paper-candidate') }}
        run: |
          permission=$(gh api "repos/${REPOSITORY}/collaborators/${ACTOR}/permission" --jq .permission 2>/dev/null || echo none)
          trusted=false
          if [[ "$ACTOR" == "wang422003" || "$permission" == "admin" || "$permission" == "maintain" || "$permission" == "write" ]]; then trusted=true; fi
          run_intake=false
          discovered=false
          if [[ "$IS_INTAKE" == "true" && "$EVENT_ACTION" == "opened" && "$trusted" == "true" ]]; then run_intake=true; fi
          if [[ "$IS_CANDIDATE" == "true" && "$EVENT_ACTION" == "labeled" && "$LABEL_NAME" == "approved-for-intake" && "$trusted" == "true" ]]; then
            run_intake=true
            [[ "$IS_INTAKE" != "true" ]] && discovered=true
          fi
          echo "run_intake=$run_intake" >> "$GITHUB_OUTPUT"
          echo "discovered=$discovered" >> "$GITHUB_OUTPUT"
          if [[ "$IS_INTAKE" == "true" && "$EVENT_ACTION" == "opened" && "$trusted" != "true" ]]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label paper-candidate
            gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "This external submission is recorded as a candidate. A maintainer must add \`approved-for-intake\` before any OpenAI API call."
          fi
      - id: config
        env:
          APP_ID: ${{ vars.BIOBENCH_APP_ID }}
          APP_KEY: ${{ secrets.BIOBENCH_APP_PRIVATE_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          [[ -n "$APP_ID" && -n "$APP_KEY" ]] && echo "app_ready=true" >> "$GITHUB_OUTPUT" || echo "app_ready=false" >> "$GITHUB_OUTPUT"
          [[ -n "$OPENAI_KEY" ]] && echo "api_ready=true" >> "$GITHUB_OUTPUT" || echo "api_ready=false" >> "$GITHUB_OUTPUT"
      - name: Explain unavailable automation
        if: steps.policy.outputs.run_intake == 'true' && (steps.config.outputs.app_ready != 'true' || steps.config.outputs.api_ready != 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label needs-human-review
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "Automated intake is paused because the repository-only GitHub App credentials or OPENAI_API_KEY are not configured. No paper content was uploaded and no production files were changed."

  extract:
    needs: authorize
    if: needs.authorize.outputs.run_intake == 'true' && needs.authorize.outputs.app_ready == 'true' && needs.authorize.outputs.api_ready == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: paper-intake-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Require a successful golden run in the last 35 days
        id: golden
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          latest=$(gh run list --repo "$REPOSITORY" --workflow paper-extraction-eval.yml --status success --limit 1 --json createdAt --jq '.[0].createdAt // ""')
          if ! python - "$latest" <<'PY'
          import datetime as dt, sys
          if not sys.argv[1]: raise SystemExit("no successful golden evaluation exists")
          created = dt.datetime.fromisoformat(sys.argv[1].replace("Z", "+00:00"))
          if dt.datetime.now(dt.timezone.utc) - created > dt.timedelta(days=35):
              raise SystemExit("latest successful golden evaluation is older than 35 days")
          PY
          then
            gh issue edit "${{ github.event.issue.number }}" --repo "$REPOSITORY" --add-label needs-human-review
            gh issue comment "${{ github.event.issue.number }}" --repo "$REPOSITORY" --body "Production intake is paused because the current prompt/model pair has no successful golden evaluation in the last 35 days. No source was uploaded."
            exit 1
          fi
      - name: Create short-lived GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.BIOBENCH_APP_ID }}
          private-key: ${{ secrets.BIOBENCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: bio-benchmark-atlas
      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with: {python-version: '3.10', cache: pip}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with: {node-version: 24, cache: pnpm}
      - run: python -m pip install -e '.[test]'
      - run: pnpm install --frozen-lockfile
      - name: Refuse a replay that already has a PR
        id: replay
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPOSITORY" --state all --json headRefName,url --jq ".[] | select(.headRefName | endswith(\"-${ISSUE_NUMBER}\")) | .url" | head -1)
          if [[ -n "$existing" ]]; then
            echo "An intake PR already exists: $existing"
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "Intake replay ignored; the existing PR is ${existing}."
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Save issue body without shell interpolation
        if: steps.replay.outputs.duplicate != 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -c 'import os; from pathlib import Path; Path(os.environ["RUNNER_TEMP"]).joinpath("issue.md").write_text(os.environ["ISSUE_BODY"], encoding="utf-8")'
      - name: Extract, verify, and generate records
        id: intake
        if: steps.replay.outputs.duplicate != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAPER_EXTRACT_MODEL: ${{ vars.PAPER_EXTRACT_MODEL || 'gpt-5.6-sol' }}
          PAPER_VERIFY_MODEL: ${{ vars.PAPER_VERIFY_MODEL || 'gpt-5.6-sol' }}
        run: |
          discovered_flag=""
          [[ "${{ needs.authorize.outputs.discovered }}" == "true" ]] && discovered_flag="--discovered"
          python scripts/run_paper_intake.py \
            --issue-body-file "$RUNNER_TEMP/issue.md" \
            --summary "$RUNNER_TEMP/summary.md" \
            --write $discovered_flag 2>&1 | tee "$RUNNER_TEMP/intake.log"
      - name: Stop safely on extraction or verification failure
        if: steps.replay.outputs.duplicate != 'true' && steps.intake.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          label=needs-human-review
          grep -Eq 'OpenAI request failed after|RateLimit|APIConnection' "$RUNNER_TEMP/intake.log" && label=extraction-failed || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-label "$label"
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "The automated double-pass intake stopped safely (\`$label\`). Unsupported claims were not written to Registry. Review the private Actions log; paper full text was not committed."
          exit 1
      - name: Validate deterministic production output
        if: steps.replay.outputs.duplicate != 'true'
        run: |
          python scripts/validate_registry.py
          python scripts/build_registry.py
          pnpm site:build
      - name: Open a Ready paper-intake PR
        id: pr
        if: steps.replay.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          work_id=$(python - <<'PY'
          import pathlib, subprocess, yaml
          files = subprocess.check_output(["git", "diff", "--name-only", "--", "registry/works", "registry/benchmark_uses"], text=True).splitlines()
          for name in files:
              data = yaml.safe_load(pathlib.Path(name).read_text())
              if data.get("entity_type") == "work": print(data["id"]); break
              if data.get("entity_type") == "benchmark_use": print(data["work_id"]); break
          PY
          )
          [[ -n "$work_id" ]] || { echo "No generated Work or BenchmarkUse"; exit 1; }
          branch="paper-intake/${work_id}-${ISSUE_NUMBER}"
          git config user.name biobench-atlas-bot
          git config user.email biobench-atlas-bot@users.noreply.github.com
          git checkout -b "$branch"
          git add registry
          git commit -m "data: intake ${work_id} from issue #${ISSUE_NUMBER}"
          git push origin "$branch"
          pr_url=$(gh pr create --repo "$REPOSITORY" --base main --head "$branch" --label paper-intake \
            --title "Paper intake: ${work_id}" --body-file "$RUNNER_TEMP/summary.md")
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
      - name: Link the Ready PR
        if: steps.replay.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "Created a Ready intake PR: ${PR_URL}. It cannot merge until validate, playwright, and wang422003's post-push APPROVED review all pass."
