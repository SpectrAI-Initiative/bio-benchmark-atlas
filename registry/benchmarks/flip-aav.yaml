entity_type: benchmark
id: flip-aav
name: FLIP AAV
aliases: [FLIP AAV capsid viability landscape]
summary: Seven supervised splits over sampled and machine-designed AAV2 VP-1 capsid variants, measuring generalization across mutation depth, fitness, and sampled-versus-designed pools.
kind: track
parent_id: flip
organizations: [Technical University of Munich, Microsoft Research New England, California Institute of Technology, University of California Berkeley, Massachusetts Institute of Technology, Salesforce Research]
release_date: '2021-10-11'
latest_version: original-2021
domains: [protein-sequence, protein-design]
capabilities: [prediction, regression]
modalities: [protein-sequence, table]
task_formats: [sequence-to-capsid-viability regression]
task_counts: &flip-aav-counts
  total: 284009
  basis: distinct sequence-fitness examples across the sampled and designed AAV pools
  reporting_status: reported
  subsets:
    - {id: aav-mut-des-test, label: Mut-Des test set, count: 201426, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Train on 82,583 sampled variants; test on 201,426 designed variants.'}
    - {id: aav-des-mut-test, label: Des-Mut test set, count: 82583, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Train on 201,426 designed variants; test on 82,583 sampled variants.'}
    - {id: aav-one-vs-rest-test, label: 1-vs-rest test set, count: 81413, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: '1,170 training examples; sampled pool only.'}
    - {id: aav-two-vs-rest-test, label: 2-vs-rest test set, count: 50776, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: '31,807 training examples; sampled pool only.'}
    - {id: aav-seven-vs-rest-test, label: 7-vs-rest test set, count: 12581, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: '70,002 training examples; sampled pool only.'}
    - {id: aav-low-vs-high-test, label: low-vs-high test set, count: 35037, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: '47,546 training examples at or below wild-type fitness; test examples are above wild-type fitness.'}
    - {id: aav-sampled-test, label: Sampled test set, count: 16517, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: '66,066 random training examples; discourse-only split not recommended for performance comparison.'}
