entity_type: benchmark
id: bixbench
name: BixBench
aliases: [Bioinformatics Benchmark]
summary: A containerized benchmark of long-horizon bioinformatics analysis over real published notebooks and associated data, with open-answer and multiple-choice evaluation modes.
kind: agentic-eval
parent_id: null
organizations: [FutureHouse, ScienceMachine]
release_date: '2025-02-28'
latest_version: v1.5
domains: [bioinformatics, genomics, transcriptomics, epigenomics, single-cell, proteomics, multiomics]
capabilities: [data-analysis, coding, tool-use, scientific-reasoning]
modalities: [text, table, figure, dna-rna-sequence, raw-omics, image, code]
task_formats: [open-ended bioinformatics analysis, multiple choice]
task_counts: &v15-counts
  total: 205
  basis: one question per row in the official v1.5 BixBench.jsonl
  reporting_status: reported
  subsets:
  - {id: bixbench-v1-5-referenced-capsules, label: Referenced capsules in v1.5 rows, count: 59, basis: unique capsule_uuid values referenced by the 205 rows, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A source-artifact count, not a partition of questions.'}
  - {id: bixbench-v1-5-readme-notebooks, label: Source notebooks stated in README, count: 60, basis: real-world published Jupyter notebooks and related capsules stated in the official README, exclusive: false, exhaustive: false, reporting_status: reported, notes: Conflicts with 59 referenced capsule UUIDs and 64 capsule archives; upstream does not document how the three units correspond.}
  - {id: bixbench-v1-5-release-archives, label: Capsule archives in v1.5 release, count: 64, basis: CapsuleFolder-*.zip paths in the official v1.5 dataset tag, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A stored-artifact count, not a partition of questions.'}
  - {id: bixbench-v1-5-llm-verifier, label: LLM-verifier questions, count: 83, basis: rows whose eval_mode is llm_verifier, exclusive: true, exhaustive: true, reporting_status: reported, notes: Mutually exclusive with the two deterministic verifier modes.}
  - {id: bixbench-v1-5-string-verifier, label: String-verifier questions, count: 61, basis: rows whose eval_mode is str_verifier, exclusive: true, exhaustive: true, reporting_status: reported, notes: Mutually exclusive with the other verifier modes.}
  - {id: bixbench-v1-5-range-verifier, label: Range-verifier questions, count: 61, basis: rows whose eval_mode is range_verifier, exclusive: true, exhaustive: true, reporting_status: reported, notes: Mutually exclusive with the other verifier modes.}
coverage_notes:
- {tag: genomics, coverage: observed, count: 74, reporting_status: reported, notes: v1.5 rows carrying the multi-label Genomics category; category counts overlap.}
- {tag: transcriptomics, coverage: observed, count: 69, reporting_status: reported, notes: v1.5 rows carrying the multi-label Transcriptomics category; category counts overlap.}
- {tag: epigenomics, coverage: observed, count: 12, reporting_status: reported, notes: v1.5 rows carrying the multi-label Epigenomics category; category counts overlap.}
- {tag: single-cell, coverage: observed, count: 2, reporting_status: reported, notes: v1.5 rows carrying the multi-label Single-Cell category; category counts overlap.}
- {tag: proteomics, coverage: observed, count: 4, reporting_status: reported, notes: v1.5 rows carrying the multi-label Proteomics category; category counts overlap.}
- {tag: multiomics, coverage: observed, count: 2, reporting_status: reported, notes: v1.5 rows carrying the multi-label Integrative Omics category; category counts overlap.}
- {tag: protein-protein-binding, coverage: unknown, count: null, reporting_status: not_reported, notes: No standalone protein-protein-binding count is published or encoded as a v1.5 category.}
- {tag: protein-ligand-binding, coverage: unknown, count: null, reporting_status: not_reported, notes: No standalone protein-ligand-binding count is published or encoded as a v1.5 category.}
access:
  level: fully-open
  tasks: The official Hugging Face release publishes all 205 v1.5 questions, targets, distractors, verifier modes, and canaries.
  artifacts: Public capsule archives contain the notebook-derived analysis environments and associated data; users must authenticate to Hugging Face to download them.
  grader: The Apache-2.0 repository publishes the string, range, LLM, multiple-choice, and open-ended grading code.
  license: Apache-2.0 for the official code and current dataset; the preprint's own reuse license is not reported
  biosafety_notes: The benchmark covers general computational-biology analyses and publishes a no-training canary; this registry mirrors neither task data nor capsule archives, and the creators do not publish a separate biosafety classification.
