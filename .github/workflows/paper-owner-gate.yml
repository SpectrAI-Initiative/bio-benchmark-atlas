name: Paper owner gate

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  checks: write
  contents: read
  issues: read
  pull-requests: read

jobs:
  owner-gate-evaluator:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted default-branch policy code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Evaluate and publish the paper-owner-gate check
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_PR_NUMBER: ${{ github.event.issue.number }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            pr_number="$COMMENT_PR_NUMBER"
          else
            pr_number="$PULL_REQUEST_NUMBER"
          fi

          pr_json="$RUNNER_TEMP_DIR/paper-owner-pr.json"
          comments_json="$RUNNER_TEMP_DIR/paper-owner-comments.json"
          gh api "repos/${REPOSITORY}/pulls/${pr_number}" > "$pr_json"
          head_ref=$(jq -r '.head.ref' "$pr_json")
          head_sha=$(jq -r '.head.sha' "$pr_json")

          conclusion=success
          title="Paper owner approval is not required"
          summary="This is not a paper-intake branch."

          if [[ "$head_ref" == paper-intake/* ]]; then
            commit_time=$(gh api "repos/${REPOSITORY}/commits/${head_sha}" --jq '.commit.committer.date')
            gh api "repos/${REPOSITORY}/issues/${pr_number}/comments" --paginate --slurp \
              --jq 'add' > "$comments_json"
            if python scripts/check_paper_owner_gate.py \
              --head-sha "$head_sha" \
              --commit-time "$commit_time" \
              --comments-file "$comments_json"; then
              title="Current paper-intake head approved"
              summary="wang422003 approved the exact current 40-character head SHA after it was committed."
            else
              conclusion=failure
              title="Current paper-intake head needs owner approval"
              summary="Comment exactly: /approve-paper-intake ${head_sha}"
            fi
          fi

          gh api --method POST "repos/${REPOSITORY}/check-runs" \
            -f name='paper-owner-gate' \
            -f head_sha="$head_sha" \
            -f status='completed' \
            -f conclusion="$conclusion" \
            -f "output[title]=$title" \
            -f "output[summary]=$summary"
