entity_type: benchmark
id: blade-analysis-generation
name: BLADE End-to-End Analysis Generation
aliases: [BLADE Task 2]
summary: The BLADE track requiring a conceptual-variable specification, executable data-transformation function, and statistical-model function for each open-ended research question and dataset.
kind: track
parent_id: blade
organizations: [University of Washington, UC Berkeley, New York University, Stanford University, University of British Columbia, Microsoft, George Washington University]
release_date: '2024-08-19'
latest_version: arXiv v3
domains: [life-science]
capabilities: [data-analysis, coding, tool-use, scientific-reasoning]
modalities: [text, table, code]
task_formats: [open-ended end-to-end scientific analysis]
task_counts: &generation-counts
  total: 12
  basis: paired research questions and datasets requiring a complete generated analysis
  reporting_status: reported
  subsets:
  - {id: blade-generation-ground-truth-decisions, label: Ground-truth analysis decisions, count: 536, basis: unique defensible decisions used by the grader across all source tasks, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A grader-reference unit, not a partition of the 12 generated-analysis tasks.'}
  - {id: blade-generation-conceptual-decisions, label: Conceptual-variable decisions, count: 118, basis: conceptual-variable decisions in the expert ground truth, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A decision-reference count.'}
  - {id: blade-generation-transform-decisions, label: Transform decisions, count: 246, basis: discrete transformation decisions in the expert ground truth, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A decision-reference count.'}
  - {id: blade-generation-modeling-decisions, label: Modeling decisions, count: 172, basis: statistical-model and formula decisions in the expert ground truth, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A decision-reference count.'}
coverage_notes:
- {tag: life-science, coverage: observed, count: 4, reporting_status: reported, notes: 'Four of the twelve official source questions are explicitly biological or ecological: AMTL, Crofoot, Panda_nuts, and Fish.'}
- {tag: protein-design, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve analysis-generation tasks concerns protein design.}
- {tag: protein-protein-binding, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve analysis-generation tasks concerns protein-protein binding.}
- {tag: protein-ligand-binding, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve analysis-generation tasks concerns protein-ligand binding.}
- {tag: genomics, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve analysis-generation tasks is an omics-analysis task.}
access:
  level: fully-open
  tasks: All twelve questions, data tables, schemas, and required submission shape are public.
  artifacts: Expert annotations and executable grader inputs are public under ODC-By-1.0.
  grader: Public hybrid evaluator combines code execution, value/graph matching, and GPT-4o-assisted semantic conversion and matching.
  license: Apache-2.0 for code; ODC-By-1.0 for data and annotations; CC BY 4.0 for the ACL paper
  biosafety_notes: Four tasks concern ecology, primate behavior, or evolutionary biology; none is a protein, omics, pathogen, intervention, or wet-lab task.
