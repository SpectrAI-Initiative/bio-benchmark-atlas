      evidence_ids: [tape-paper-definition-evidence]
      notes: Sequence-to-fluorescence regression; this is prediction, not sequence generation.
    - task_type_id: protein-stability-prediction
      coverage: explicitly-in-scope
      mapping_method: official-taxonomy
      confidence: high
      count: 1
      count_unit: tasks
      count_basis: Supervised downstream benchmark tasks.
      count_ref: null
