# Evidence-backed Scientific Task mappings for the first post-v1.1 expansion.
classifications:
  tape:
    status: complete
    benchmark_version: original-2019
    as_of: null
    notes: The five supervised downstream tasks are explicitly defined and grouped in the creator paper.
    entries:
    - task_type_id: protein-secondary-structure-prediction
      coverage: explicitly-in-scope
      mapping_method: official-taxonomy
      confidence: high
      count: 1
      count_unit: tasks
      count_basis: Supervised downstream benchmark tasks.
      count_ref: null
      reporting_status: reported
      evidence_ids: [tape-paper-definition-evidence]
      notes: Per-residue three-state and eight-state secondary-structure prediction constitute one benchmark task.
    - task_type_id: protein-contact-map-prediction
      coverage: explicitly-in-scope
      mapping_method: official-taxonomy
      confidence: high
      count: 1
      count_unit: tasks
      count_basis: Supervised downstream benchmark tasks.
      count_ref: null
      reporting_status: reported
      evidence_ids: [tape-paper-definition-evidence]
      notes: Residue-pair contact prediction is the second structure task; it is not relabeled as full 3D folding.
    - task_type_id: protein-remote-homology-detection
      coverage: explicitly-in-scope
      mapping_method: official-taxonomy
      confidence: high
      count: 1
      count_unit: tasks
      count_basis: Supervised downstream benchmark tasks.
      count_ref: null
