entity_type: benchmark
id: proteingym
name: ProteinGym
aliases: [Protein Gym]
summary: Versioned deep-mutational-scanning and clinical-variant benchmarks for protein fitness prediction and design in zero-shot and supervised regimes.
kind: suite
parent_id: null
organizations: [University of Oxford, Harvard Medical School, Seismic Therapeutic, Harvard University, Centre for Genomic Regulation, Universitat Pompeu Fabra, Broad Institute]
release_date: '2023-12-08'
latest_version: '1.3'
domains: [protein-sequence, protein-design, protein-ligand-binding, clinical-translational]
capabilities: [prediction, regression, classification, design, optimization]
modalities: [protein-sequence, structure-3d, table]
task_formats: [zero-shot mutation-effect prediction, supervised mutation-effect prediction, clinical variant classification]
task_counts:
  total: null
  basis: heterogeneous DMS assays, clinical proteins, and mutant measurements
  reporting_status: not_reported
  subsets:
    - {id: dms-substitution-assays, label: DMS substitution assays, count: 217, basis: assays, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'The v1.3 reference file has 217 assay rows; assay count is distinct from the README description of approximately 2.7 million missense variants.'}
    - {id: dms-indel-assays, label: DMS indel assays, count: 66, basis: assays, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'The v1.3 versioned archive has 66 assay records; the pinned repository README says 74, so this value is marked Conflicted.'}
    - {id: clinical-substitution-proteins, label: Clinical substitution proteins, count: 2525, basis: proteins, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'The v1.3 clinical reference file has one row per protein.'}
    - {id: clinical-indel-proteins, label: Clinical indel proteins, count: 1555, basis: proteins, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'The v1.3 clinical indel reference file has one row per protein.'}
    - {id: dms-substitution-binding-assays, label: DMS substitution assays in the Binding function category, count: 13, basis: assays, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'The v1.3 reference file contains 13 rows with coarse_selection_type=Binding; target type is not split into protein-protein versus protein-ligand counts.'}
coverage_notes:
  - {tag: protein-design, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'NDCG@10% and top-10% recall evaluate design-oriented ranking, but design is not a separately counted task subset.'}
  - {tag: protein-ligand-binding, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'The paper explicitly includes ligand binding and reports a generic Binding function category: 14 substitution assays in v1.0 and 13 in v1.1-v1.3. It does not publish a target-type split, so no protein-ligand-only count is inferred.'}
  - {tag: protein-protein-binding, coverage: observed, count: null, reporting_status: not_reported, notes: 'Some source assays concern protein-protein binding, but the official function category is generic Binding and no protein-protein-only count is published.'}
access:
  level: fully-open
  tasks: Processed DMS assay tables and clinical benchmark files are publicly downloadable in versioned archives.
  artifacts: Official releases include reference files, model scores, MSAs, predicted structures, cross-validation folds, and raw/processed benchmark data.
  grader: Public deterministic scoring scripts compute the official DMS and clinical metrics.
  license: MIT
  biosafety_notes: 'The creator paper explicitly discusses dual-use risk for protein fitness and design models, including harmful optimization; this registry mirrors metadata and links only.'
