version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: pip
    directory: /
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        update-types: [minor, patch]
        exclude-patterns: [openai]
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly}
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        patterns: ['*']
        update-types: [minor, patch]
