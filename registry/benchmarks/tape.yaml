entity_type: benchmark
id: tape
name: TAPE
aliases: [Tasks Assessing Protein Embeddings]
summary: A five-task benchmark for protein representation learning spanning secondary structure, residue contacts, remote homology, fluorescence, and stability.
kind: suite
parent_id: null
organizations: [University of California Berkeley]
release_date: '2019-06-19'
latest_version: original-2019
domains: [protein-sequence, protein-structure, protein-design]
capabilities: [prediction, classification, regression]
modalities: [protein-sequence]
task_formats: [sequence classification, per-residue classification, residue-pair classification, sequence regression]
task_counts: &tape-counts
  total: 5
  basis: supervised downstream benchmark tasks
  reporting_status: reported
  subsets:
    - {id: tape-structure-tasks, label: Structure prediction tasks, count: 2, basis: supervised downstream tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Secondary structure and contact prediction.}
    - {id: tape-evolution-task, label: Evolutionary understanding task, count: 1, basis: supervised downstream tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Remote homology detection.}
    - {id: tape-engineering-tasks, label: Protein engineering tasks, count: 2, basis: supervised downstream tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Fluorescence and stability landscape prediction.}
coverage_notes:
  - {tag: protein-structure, coverage: explicitly-in-scope, count: 2, reporting_status: reported, notes: Secondary-structure and contact-map prediction are distinct tasks; TAPE is not a full 3D folding benchmark.}
  - {tag: protein-design, coverage: explicitly-in-scope, count: 2, reporting_status: reported, notes: 'The paper calls fluorescence and stability protein-engineering tasks, but they evaluate prediction rather than sequence generation.'}
access:
  level: fully-open
  tasks: The five supervised datasets, prescribed train/validation/test splits, and a Pfam pretraining corpus are publicly downloadable.
  artifacts: The original TensorFlow implementation and a later PyTorch implementation publish loaders, training code, pretrained weights, and evaluators.
  grader: Deterministic task-specific accuracy, precision, and rank-correlation scorers.
  license: MIT for the original implementation; benchmark datasets retain their source-specific terms and citation requirements.
  biosafety_notes: The registry stores no protein sequences or model outputs.
