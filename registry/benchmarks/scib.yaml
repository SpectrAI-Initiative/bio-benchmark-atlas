entity_type: benchmark
id: scib
name: scIB
aliases: [Single-cell integration benchmarking, Benchmarking atlas-level data integration]
summary: A 13-task benchmark of single-cell data integration across simulated, scRNA-seq, and scATAC-seq settings, evaluated with 14 batch-removal and biological-conservation metrics.
kind: suite
parent_id: null
organizations: [Helmholtz Zentrum München, Technical University of Munich]
release_date: '2021-12-23'
latest_version: paper-2021
domains: [single-cell, transcriptomics, epigenomics]
capabilities: [data-analysis]
modalities: [raw-omics, table]
task_formats: [single-cell batch integration, representation evaluation]
task_counts: &scib-counts
  total: 13
  basis: atlas-level integration tasks
  reporting_status: reported
  subsets:
    - {id: scib-simulation, label: Simulation tasks, count: 2, basis: atlas-level integration tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Two simulations with known ground truth.}
    - {id: scib-scrna, label: scRNA-seq tasks, count: 5, basis: atlas-level integration tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Five RNA integration settings.}
    - {id: scib-scatac, label: scATAC-seq tasks, count: 6, basis: atlas-level integration tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: Six ATAC integration settings across feature spaces and scales.}
coverage_notes:
  - {tag: single-cell, coverage: explicitly-in-scope, count: 13, reporting_status: reported, notes: All thirteen tasks assess integration of single-cell datasets.}
  - {tag: transcriptomics, coverage: explicitly-in-scope, count: 5, reporting_status: reported, notes: Five real scRNA-seq integration tasks; simulation is counted separately.}
  - {tag: epigenomics, coverage: explicitly-in-scope, count: 6, reporting_status: reported, notes: Six scATAC-seq integration tasks.}
access:
  level: fully-open
  tasks: Preprocessed integration tasks, result matrices, and source datasets are linked from the reproducibility project.
  artifacts: The scIB package, Snakemake benchmarking pipeline, metrics, and reproducibility website are public.
  grader: Fourteen deterministic metrics plus batch-removal, bio-conservation, and 60/40 weighted overall scores.
  license: MIT for scIB code; source datasets from 23 publications retain their original terms.
  biosafety_notes: No biosafety-specific restrictions are identified; the registry mirrors no cell-level data.
