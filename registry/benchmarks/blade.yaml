entity_type: benchmark
id: blade
name: BLADE
aliases: [Benchmarking Language Model Agents for Data-Driven Science]
summary: A cross-domain suite for discerning defensible analysis decisions and generating executable end-to-end analyses for open-ended scientific research questions; four of its twelve source questions are explicitly biological or ecological.
kind: suite
parent_id: null
organizations: [University of Washington, UC Berkeley, New York University, Stanford University, University of British Columbia, Microsoft, George Washington University]
release_date: '2024-08-19'
latest_version: arXiv v3
domains: [life-science]
capabilities: [knowledge, classification, data-analysis, coding, tool-use, scientific-reasoning]
modalities: [text, table, code]
task_formats: [multiple choice, open-ended end-to-end scientific analysis]
task_counts: &current-counts
  total: 12
  basis: paired real-world research questions and datasets used as the source units for BLADE
  reporting_status: reported
  subsets:
  - {id: blade-mcq-items, label: Multiple-choice questions, count: 188, basis: individual decision-discrimination questions across the source datasets, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A separate question unit, not a partition of the 12 research-question/dataset pairs.'}
  - {id: blade-mcq-conceptual, label: Conceptual-variable MCQs, count: 20, basis: individual conceptual-variable discrimination questions, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'One component of the 188-question MCQ track.'}
  - {id: blade-mcq-transform, label: Transformation MCQs, count: 168, basis: individual transformation-decision discrimination questions, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'One component of the 188-question MCQ track.'}
  - {id: blade-ground-truth-decisions, label: Ground-truth analysis decisions, count: 536, basis: unique defensible decisions in the expert ground-truth decision space, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'A grader-reference unit, not a count of benchmark tasks.'}
  - {id: blade-ground-truth-conceptual, label: Ground-truth conceptual-variable decisions, count: 118, basis: conceptual-variable decisions in the ground-truth decision space, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Together with transform and modeling decisions, partitions the 536 decision references rather than the 12 source tasks.'}
  - {id: blade-ground-truth-transform, label: Ground-truth transform decisions, count: 246, basis: discrete data-transformation decisions in the ground-truth decision space, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Together with conceptual-variable and modeling decisions, partitions the 536 decision references.'}
  - {id: blade-ground-truth-modeling, label: Ground-truth modeling decisions, count: 172, basis: statistical-model and model-formula decisions in the ground-truth decision space, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Together with conceptual-variable and transform decisions, partitions the 536 decision references.'}
coverage_notes:
- {tag: life-science, coverage: observed, count: 4, reporting_status: reported, notes: 'Registry mapping of four explicitly biological or ecological source questions in paper Table 3: AMTL, Crofoot, Panda_nuts, and Fish. BLADE itself is cross-domain.'}
- {tag: protein-design, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve official research questions concerns protein design or optimization.}
- {tag: protein-protein-binding, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve official research questions concerns protein-protein binding.}
- {tag: protein-ligand-binding, coverage: not-in-scope, count: 0, reporting_status: reported, notes: None of the twelve official research questions concerns protein-ligand binding.}
- {tag: genomics, coverage: not-in-scope, count: 0, reporting_status: reported, notes: The official question inventory contains no genomics or omics-analysis task.}
- {tag: transcriptomics, coverage: not-in-scope, count: 0, reporting_status: reported, notes: The official question inventory contains no transcriptomics task.}
- {tag: single-cell, coverage: not-in-scope, count: 0, reporting_status: reported, notes: The official question inventory contains no single-cell task.}
access:
  level: fully-open
  tasks: The official repository publishes the twelve research questions, data tables, 188 MCQs, and associated dataset descriptions.
  artifacts: The repository publishes expert annotations and grader inputs; code is Apache-2.0 and the benchmark data directory is ODC-By-1.0.
  grader: Public code performs executable-code checks, value and graph matching for transformations, and GPT-4o-assisted semantic conversion and matching for conceptual variables and statistical models.
  license: Apache-2.0 for code; ODC-By-1.0 for the benchmark data and annotations; CC BY 4.0 for the ACL paper
  biosafety_notes: Four source questions concern ecology, primate behavior, or evolutionary biology, but BLADE contains no protein, omics, pathogen, intervention, or wet-lab task and the creators publish no separate biosafety restriction.
