name: Check Sources

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10', cache: pip}
      - run: python -m pip install -e .
      - uses: actions/cache/restore@v4
        with:
          path: .source-monitor-state.json
          key: source-monitor-state-${{ github.run_id }}
          restore-keys: source-monitor-state-
      - run: python scripts/check_sources.py --output source-check-report.json
      - run: python scripts/update_source_state.py --report source-check-report.json --state .source-monitor-state.json --issues source-issues.json
      - name: Open issues after three consecutive failures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -c '.[]' source-issues.json | while read -r item; do
            id=$(jq -r '.work_id' <<<"$item")
            url=$(jq -r '.url' <<<"$item")
            status=$(jq -r '.status // "request failed"' <<<"$item")
            failures=$(jq -r '.consecutive_failures' <<<"$item")
            title="[Source stale] ${id}"
            if ! gh issue list --state open --search "${title} in:title" --json title --jq '.[].title' | grep -Fxq "$title"; then
              gh issue create --title "$title" --label source-monitor --body "Canonical source has failed ${failures} consecutive weekly checks.\n\n- Work: \`${id}\`\n- URL: ${url}\n- Latest status: ${status}\n\nThis issue is informational. The registry was not modified automatically."
            fi
          done
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .source-monitor-state.json
          key: source-monitor-state-${{ github.run_id }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-check-${{ github.run_id }}
          path: source-check-report.json
          retention-days: 30
