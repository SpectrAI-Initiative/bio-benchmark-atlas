entity_type: benchmark
id: bioinstruction
name: Biology-Instructions
aliases: [Biology Instructions, Biology-Instructions Evaluation]
summary: A multi-omics sequence-instruction suite with 21 formal predictive tasks across DNA, RNA, protein, and multi-molecule inputs; the final paper reports task-specific held-out evaluations rather than a single aggregate score.
kind: suite
parent_id: null
organizations: [Shanghai Artificial Intelligence Laboratory, University of Science and Technology of China, University of Sydney, University of Toronto, Chinese University of Hong Kong, Shanghai Jiao Tong University, Fudan University, Shanghai Innovation Institute]
release_date: '2024-12-26'
latest_version: emnlp-2025
domains: [genomics, transcriptomics, epigenomics, protein-sequence, protein-protein-binding, antibody-antigen, rna-protein-binding, multiomics]
capabilities: [prediction, classification, regression, scientific-reasoning]
modalities: [text, dna-rna-sequence, protein-sequence]
task_formats: [sequence-conditioned classification and regression instructions]
task_counts: &biology-instructions-counts
  total: 21
  basis: formal evaluation tasks in the final creator paper; sample counts are tracked on child records and never added to this task count
  reporting_status: reported
  subsets:
    - {id: bioinstruction-dna-tasks, label: DNA tasks, count: 6, basis: formal tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'EMP, EA, PD300, CPD, TB-H, and TB-M.'}
    - {id: bioinstruction-rna-tasks, label: RNA tasks, count: 6, basis: formal tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'APA, ncRNA, Modif, MRL, PRS, and CRI-On.'}
    - {id: bioinstruction-protein-tasks, label: Protein tasks, count: 5, basis: formal tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'EC, Stability, Fluorescence, Solubility, and Thermostability.'}
    - {id: bioinstruction-multi-molecule-tasks, label: Multi-molecule tasks, count: 4, basis: formal tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'AAN, RPI, EPI, and siRNA.'}
coverage_notes:
  - {tag: protein-sequence, coverage: explicitly-in-scope, count: 5, reporting_status: reported, notes: 'Five protein-primary formal tasks; protein-containing interaction tasks are tracked separately.'}
  - {tag: antibody-antigen, coverage: explicitly-in-scope, count: 1, reporting_status: reported, notes: 'Antibody-Antigen Neutralization is one formal multi-molecule task.'}
  - {tag: rna-protein-binding, coverage: explicitly-in-scope, count: 1, reporting_status: reported, notes: 'RNA-Protein Interaction Prediction is one formal multi-molecule task.'}
  - {tag: protein-design, coverage: not-in-scope, count: 0, reporting_status: reported, notes: 'Section 3.2.1 explicitly leaves generative applications such as sequence design for future work; property prediction is not relabeled as design.'}
access:
  level: partially-open
  tasks: The final paper publishes task definitions, source datasets, split counts, prompts, and metrics; the creator repository does not include the complete evaluation inputs and labels.
  artifacts: The pinned repository exposes the Stage-3 workbook and evaluator, but not the complete 21-task evaluation splits or published model outputs. Its Stage-3 workbook has 8,002 non-empty data rows, while the paper describes 8,000 final AI-polished examples.
  grader: The official evaluator is public, including numeric/label extraction, task-specific metrics, and a sentiment-model fallback for some textual classifications.
  license: null
  biosafety_notes: The suite includes antibody-antigen and RNA-protein interaction prediction. BioBench Atlas stores only metadata and aggregate results and does not mirror sequences.
resources:
  - {id: bioinstruction-final-paper-resource, type: paper, url: 'https://aclanthology.org/2025.findings-emnlp.978.pdf', license: CC-BY-4.0, access_notes: 'Final peer-reviewed creator paper; SHA256 3bc92905728242b59bc660372f16c768433d69b64639e801e58e63f4e2b84d4a.', last_checked: '2026-07-21', pin: {kind: snapshot, value: 'sha256:3bc92905728242b59bc660372f16c768433d69b64639e801e58e63f4e2b84d4a', url: 'https://aclanthology.org/2025.findings-emnlp.978.pdf'}}
  - {id: bioinstruction-preprint-resource, type: paper, url: 'https://arxiv.org/abs/2412.19191', license: null, access_notes: 'Initial public preprint record.', last_checked: '2026-07-21', pin: null}
  - {id: bioinstruction-repository-resource, type: repository, url: 'https://github.com/hhnqqq/Biology-Instructions', license: null, access_notes: 'Official repository has no LICENSE file at the pinned commit. register_tasks.json contains 24 keys, including duplicate or obsolete names, rather than the final paper taxonomy of 21 tasks.', last_checked: '2026-07-21', pin: {kind: commit, value: 600acaa08c0302e8f5ce86de0fe041f21c13b53e, url: 'https://github.com/hhnqqq/Biology-Instructions/tree/600acaa08c0302e8f5ce86de0fe041f21c13b53e'}}
