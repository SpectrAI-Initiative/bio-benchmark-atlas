entity_type: evaluation_run
id: bixbench-creator-paper
work_id: bixbench-paper
benchmark_id: bixbench
benchmark_version: v1.0
model_ids: [bixbench-gpt-4o-unversioned, bixbench-claude-3-5-sonnet-unversioned]
scope: {type: full, n: 296, subset_id: null, filter: 'All 296 v1.0 questions in the primary open-answer, plots/images-allowed condition.', reporting_status: reported}
protocol:
  shots: {value: zero-shot task initialization, reporting_status: reported, notes: Each trajectory starts from a task capsule without in-context demonstrations.}
  turns: {value: multi-turn ReAct agent trajectory, reporting_status: reported, notes: 'The agent repeatedly edits and executes a notebook, inspects the workspace, and submits a final answer.'}
  system_prompt_public: {value: true, reporting_status: reported, notes: The final trajectory-initiation prompt is reproduced in Appendix A and the paper-era harness is public.}
  reasoning: {value: Aviary ReActAgent with at most 25 steps, reporting_status: reported, notes: Maximum steps are recorded in the paper-era config; no provider reasoning-effort control is reported.}
  tools:
    browser: {value: false, reporting_status: reported, notes: 'The published scaffold exposes notebook editing, workspace listing, and answer submission rather than a browser.'}
    internet: {value: null, reporting_status: not_reported, notes: Network availability inside the container is not reported.}
    databases: {value: null, reporting_status: not_reported, notes: External database access is not reported.}
    code_execution: {value: true, reporting_status: reported, notes: 'Every notebook edit reruns the notebook with Python, R, and Bash packages available.'}
    container: {value: true, reporting_status: reported, notes: Analyses run in the pre-built BixBench-env:v1.0 Docker container.}
    external_tools: {value: 'edit cell, list workdir, and submit answer', reporting_status: reported, notes: These are the three agent tools listed in the paper.}
  token_budget: {value: null, reporting_status: not_reported, notes: Not reported.}
  time_budget: {value: 'maximum 25 agent steps', reporting_status: reported, notes: No wall-clock or token limit is reported.}
  temperature: {value: 1.0, reporting_status: reported, notes: Paper-era official configuration value.}
  seed: {value: null, reporting_status: not_reported, notes: Not reported.}
  repeats: {value: 10, reporting_status: reported, notes: Each capsule analysis was run independently ten times per model and modality.}
  grader: {type: binary LLM judgment against the ground-truth solution, model: Claude 3.5 Sonnet (exact version not reported), human_review: false, reporting_status: reported}
  statistical: {value: accuracy over all question-trajectory pairs; official plots use 95% Wilson intervals, reporting_status: reported, notes: The paper text prints rounded headline accuracies but not numeric interval bounds.}
  contamination: {value: null, reporting_status: not_reported, notes: No pretraining-contamination or decontamination analysis is reported.}
metrics:
- {metric_id: accuracy, source_label: Accuracy, unit: percent, range: [0, 100], higher_is_better: true, aggregation: question-trajectory-weighted mean over ten runs per question, pass_threshold: null, tolerance: binary LLM judge}
results:
- {model_id: bixbench-gpt-4o-unversioned, metric_id: accuracy, value: 9.0, ci_low: null, ci_high: null, n: 296, notes: 'Rounded open-answer headline in the paper text; ten trajectories per capsule, with plots/images allowed.', status: verified, confidence: high, evidence_ids: [bixbench-evidence-paper-open-results]}
- {model_id: bixbench-claude-3-5-sonnet-unversioned, metric_id: accuracy, value: 17.0, ci_low: null, ci_high: null, n: 296, notes: 'Rounded open-answer headline in the paper text; ten trajectories per capsule, with plots/images allowed.', status: verified, confidence: high, evidence_ids: [bixbench-evidence-paper-open-results]}
comparability_group: bixbench-v1-open-agentic-images-ten-runs
verification: {status: verified, last_verified: '2026-07-21', notes: 'Original full scope, tool/container protocol, ten repeats, grader, and the two printed open-answer scores verified; unprinted interval bounds are left null.'}
