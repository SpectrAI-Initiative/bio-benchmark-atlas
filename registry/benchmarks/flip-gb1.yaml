  reporting_status: reported
  subsets:
    - {id: gb1-one-vs-rest-test, label: 1-vs-rest test set, count: 8704, basis: test examples, exclusive: false, exhaustive: false, reporting_status: reported, notes: '29 training examples: wild type and single mutants.'}
