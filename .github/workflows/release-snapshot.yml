name: Release Registry Snapshot

on:
  workflow_dispatch:
    inputs:
      version:
        description: Calendar registry version, for example 2026.07
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: {python-version: '3.10', cache: pip}
      - run: python -m pip install -e .
      - run: python scripts/validate_registry.py
      - run: python scripts/build_registry.py
      - name: Create immutable snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "registry-${VERSION}" exports/* --title "Registry ${VERSION}" --notes "Verified BioBench Atlas registry snapshot ${VERSION}. JSON and CSV exports are generated from the tagged YAML source."
