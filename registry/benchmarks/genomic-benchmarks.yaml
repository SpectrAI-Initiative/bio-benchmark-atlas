access:
  level: fully-open
  tasks: Versioned coordinates, train/test splits, cloud-cached sequences, and Python/Hugging Face loaders are public.
  artifacts: The official package publishes dataset construction notebooks and TensorFlow/PyTorch baseline workflows.
  grader: Deterministic classification accuracy and F1 calculations on held-out test sets.
  license: Apache-2.0 for package code; reference genomes and adapted source datasets retain source-specific terms.
  biosafety_notes: The benchmark concerns public genomic annotations; this registry mirrors no sequences.
