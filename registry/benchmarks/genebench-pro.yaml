id: genebench-pro
name: GeneBench-Pro
aliases:
- Gene Bench Pro
summary: A research-level agent benchmark of 129 synthetic, multistage computational-biology analyses that require iterative
  QC, statistical modeling, diagnostics, and decision-relevant judgment.
kind: agentic-eval
parent_id: null
organizations:
- OpenAI
