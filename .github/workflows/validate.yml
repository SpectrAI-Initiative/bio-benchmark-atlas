name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: {python-version: '3.10', cache: pip}
      - uses: pnpm/action-setup@v6
        with: {version: 10.12.1}
      - uses: actions/setup-node@v7
        with: {node-version: '24', cache: pnpm}
      - run: python -m pip install -e '.[test]'
      - run: pnpm install --frozen-lockfile
      - run: pnpm registry:validate
      - run: pnpm test:data
      - run: pnpm registry:build
      - run: pnpm site:build
      - name: Verify generated exports are deterministic
        run: |
          find exports -type f -exec sha256sum {} + | sort > /tmp/first.sha
          pnpm registry:build
          find exports -type f -exec sha256sum {} + | sort > /tmp/second.sha
          diff -u /tmp/first.sha /tmp/second.sha
