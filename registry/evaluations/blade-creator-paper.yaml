entity_type: evaluation_run
id: blade-creator-paper
work_id: blade-paper
benchmark_id: blade-analysis-generation
benchmark_version: arXiv v3
model_ids: [blade-codellama-7b-instruct, blade-deepseek-coder-6-7b-instruct, blade-llama3-8b-unversioned, blade-llama3-70b-unversioned, blade-mixtral-8x22b-unversioned, blade-gpt35-turbo-unversioned, blade-gpt4o-unversioned, blade-gemini-1-5-pro-unversioned, blade-claude-3-5-sonnet-20240620]
scope: {type: full, n: 12, subset_id: null, filter: 'All twelve BLADE research-question/dataset pairs in the one-turn analysis-generation setting.', reporting_status: reported}
protocol:
  shots: {value: one-shot, reporting_status: reported, notes: The prompt includes one complete worked analysis example.}
  turns: {value: single-turn, reporting_status: reported, notes: 'One model completion produces the conceptual variables, transform function, and statistical-model function.'}
  system_prompt_public: {value: true, reporting_status: reported, notes: 'The full system, task, schema, format, and worked-example prompts are published in the appendix and repository.'}
  reasoning: {value: direct prompted generation without an agent loop, reporting_status: reported, notes: No provider reasoning-effort control is reported.}
  tools:
    browser: {value: false, reporting_status: reported, notes: No browser tool is exposed in the one-turn baseline.}
    internet: {value: false, reporting_status: reported, notes: No network tool is exposed in the one-turn baseline.}
    databases: {value: false, reporting_status: reported, notes: No external database tool is exposed.}
    code_execution: {value: false, reporting_status: reported, notes: The model does not execute code during generation; the evaluator subsequently executes the submitted transform/model code.}
    container: {value: false, reporting_status: reported, notes: No interactive sandbox is exposed to the one-turn model.}
    external_tools: {value: none, reporting_status: reported, notes: The model receives the question and serialized dataset schema directly.}
  token_budget: {value: null, reporting_status: not_reported, notes: No per-run token limit is reported.}
  time_budget: {value: null, reporting_status: not_reported, notes: No wall-clock limit is reported.}
  temperature: {value: 0.8, reporting_status: reported, notes: Used to encourage diverse valid analysis decisions across repeated runs.}
  seed: {value: null, reporting_status: not_reported, notes: No random seed is reported.}
  repeats: {value: 40, reporting_status: reported, notes: Forty independent generations per model and source dataset.}
  grader: {type: hybrid automatic executable and decision matching, model: GPT-4o (exact snapshot not reported), human_review: false, reporting_status: reported}
  statistical: {value: 'For each dataset and decision type, average precision across all runs and coverage@10 feed a harmonic-mean F1; decision-type F1 values are weighted by ground-truth decision counts. Reported F1 is the mean of 1,000 bootstrap resamples with a percentile-derived 95% interval.', reporting_status: reported, notes: 'Run errors receive hit rate zero and remain in coverage. Modeling-decision weighting uses min(|G_model|, 10).'}
  contamination: {value: null, reporting_status: not_reported, notes: No pretraining-contamination or decontamination analysis is reported.}
metrics:
- {metric_id: average-precision, source_label: Average precision, unit: percent, range: [0, 100], higher_is_better: true, aggregation: mean of per-run precision followed by macro averaging across datasets for each decision type, pass_threshold: null, tolerance: GPT-4o semantic matching plus transformation value/graph matching}
- {metric_id: coverage-at-10, source_label: Coverage@10, unit: percent, range: [0, 100], higher_is_better: true, aggregation: ground-truth coverage of the union of ten sampled runs followed by macro averaging across datasets for each decision type, pass_threshold: null, tolerance: run errors count as zero-coverage generations}
- {metric_id: decision-weighted-f1, source_label: Decision-type weighted F1-score, unit: percent, range: [0, 100], higher_is_better: true, aggregation: weighted mean of per-decision-type harmonic means of average precision and coverage@10, pass_threshold: null, tolerance: 1000-run bootstrap mean and 95% interval}
