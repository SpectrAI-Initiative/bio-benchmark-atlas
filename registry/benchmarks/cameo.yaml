entity_type: benchmark
id: cameo
name: CAMEO
aliases: [Continuous Automated Model EvaluatiOn]
summary: Weekly, automated, independent, blind evaluation of registered macromolecular structure-prediction servers on complete PDB entries whose experimental structures are withheld during prediction.
kind: competition
parent_id: null
organizations: [SIB Swiss Institute of Bioinformatics, Biozentrum University of Basel]
release_date: '2012-01-01'
latest_version: current-complex-3d
domains: [protein-structure, protein-protein-binding, protein-ligand-binding, antibody-antigen]
capabilities: [prediction]
modalities: [protein-sequence, dna-rna-sequence, structure-3d]
task_formats: [continuous blind complete-complex structure prediction, stoichiometry prediction, ligand pose prediction]
task_counts:
  total: null
  basis: selected complete PDB entries accumulated by an unbounded weekly rolling service
  reporting_status: not_reported
  subsets: []
coverage_notes:
  - {tag: protein-protein-binding, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'Medium and hard complete-complex targets include homomers, heteromers, and antibodies; the living service has no fixed all-time count.'}
  - {tag: protein-ligand-binding, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'Ligand targets and ligand-containing medium/hard targets are in scope; the living service has no fixed all-time count.'}
  - {tag: antibody-antigen, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'Antibody complexes are analyzed as a protein-protein subclass; no current rolling count is asserted.'}
access:
  level: partially-open
  tasks: Public and development servers receive selected PDB pre-release entries; participation requires server registration and development-server names remain disguised.
  artifacts: Public-server targets, model-1 results, reference structures, predictions, scores, and time-window downloads are public after release; models 2-5 and advanced scores are in downloads.
  grader: Fully automated OpenStructure scoring against released PDB biounits; no single metric or overall ranking is defined.
  license: CAMEO-provided data and submitted redistributable predictions are CC BY-SA 4.0; AlphaFold 3 outputs retain separate terms.
  biosafety_notes: The registry mirrors no pre-release sequences, structures, ligands, predictions, or development-server results.
resources:
  - {id: cameo-current-site-resource, type: website, url: 'https://cameo3d.org/', license: 'CC BY-SA 4.0 for CAMEO-provided data', access_notes: Current official result and comparison interface., last_checked: '2026-07-21', pin: {kind: snapshot, value: '2026-07-21', url: 'https://cameo3d.org/'}}
  - {id: cameo-current-help-resource, type: documentation, url: 'https://cameo3d.org/help', license: 'CC BY-SA 4.0 for CAMEO-provided data', access_notes: 'Current workflow, filtering, formats, metrics, aggregation, and download documentation.', last_checked: '2026-07-21', pin: {kind: snapshot, value: '2026-07-21', url: 'https://cameo3d.org/help'}}
  - {id: cameo-terms-resource, type: documentation, url: 'https://cameo3d.org/terms', license: 'CC BY-SA 4.0', access_notes: Official access and redistribution terms., last_checked: '2026-07-21', pin: {kind: snapshot, value: '2026-07-21', url: 'https://cameo3d.org/terms'}}
  - {id: cameo-complex-paper-resource, type: paper, url: 'https://doi.org/10.1002/prot.70060', license: 'CC BY 4.0', access_notes: Final creator paper for the complete-complex platform and 2024 study snapshot., last_checked: '2026-07-21', pin: {kind: version, value: 'Proteins 94(1):403-413', url: 'https://doi.org/10.1002/prot.70060'}}
  - {id: cameo-foundation-paper-resource, type: paper, url: 'https://doi.org/10.1002/prot.25431', license: null, access_notes: Creator paper documenting the original continuously running platform., last_checked: '2026-07-21', pin: {kind: version, value: 'Proteins 86(S1):387-398', url: 'https://doi.org/10.1002/prot.25431'}}
  - {id: cameo-legacy-help-resource, type: documentation, url: 'https://archive.cameo3d.org/cameong_help/3d/', license: 'CC BY-SA 4.0 for CAMEO-provided data', access_notes: 'Official archive of the discontinued single-chain 3D category, which ended in April 2025.', last_checked: '2026-07-21', pin: {kind: snapshot, value: legacy-single-chain-ended-2025-04, url: 'https://archive.cameo3d.org/cameong_help/3d/'}}
implementations:
  - {framework: CAMEO hosted evaluation service using OpenStructure, status: official, url: 'https://cameo3d.org/', commit: null, notes: 'The hosted grader is operational and documented; no public commit-pinned deployment source is asserted.'}
versions:
