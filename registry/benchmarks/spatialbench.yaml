coverage_notes:
  - {tag: spatial-omics, coverage: explicitly-in-scope, count: 159, reporting_status: reported, notes: Every current evaluation is drawn from a spatial transcriptomics workflow.}
  - {tag: transcriptomics, coverage: explicitly-in-scope, count: 159, reporting_status: reported, notes: The official release describes all five platforms as spatial transcriptomics technologies.}
  - {tag: single-cell, coverage: observed, count: null, reporting_status: not_reported, notes: 'Cell typing and clustering are explicit categories, but a standalone single-cell-only count is not published.'}
access:
  level: partially-open
  tasks: The full 159-evaluation set is withheld to reduce contamination; a representative sample covering every platform type and task category is public.
  artifacts: The repository releases example evaluations, representative trajectories, deterministic grader code, methods, and aggregate full-suite results.
  grader: Five deterministic grader families cover numeric tolerance, multiple choice, marker-gene precision/recall, label-set Jaccard, and distribution comparison.
  license: Apache-2.0 for the official repository; full withheld benchmark artifacts have no separately published redistribution grant
  biosafety_notes: The tasks analyze spatial biology datasets. This registry stores only metadata and result summaries and mirrors neither withheld data nor trajectories.
