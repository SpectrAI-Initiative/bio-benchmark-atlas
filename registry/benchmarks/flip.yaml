entity_type: benchmark
id: flip
name: FLIP
aliases: [Fitness Landscape Inference for Proteins]
summary: A supervised protein sequence-to-fitness benchmark that turns three experimental landscapes into 15 biologically motivated dataset splits for testing generalization in protein engineering.
kind: suite
parent_id: null
organizations: [Technical University of Munich, Microsoft Research New England, California Institute of Technology, University of California Berkeley, Massachusetts Institute of Technology, Salesforce Research]
release_date: '2021-10-11'
latest_version: original-2021
domains: [protein-sequence, protein-design, protein-protein-binding]
capabilities: [prediction, regression]
modalities: [protein-sequence, table]
task_formats: [supervised sequence-to-fitness regression]
task_counts: &flip-counts
  total: 15
  basis: dataset-and-split benchmark tasks
  reporting_status: reported
  subsets:
    - {id: flip-aav-tasks, label: AAV landscape splits, count: 7, basis: dataset-and-split tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'Six active comparison splits plus one sampled split used mainly for discourse.'}
    - {id: flip-gb1-tasks, label: GB1 landscape splits, count: 5, basis: dataset-and-split tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'Four active comparison splits plus one sampled split used mainly for discourse.'}
    - {id: flip-meltome-tasks, label: Meltome thermostability splits, count: 3, basis: dataset-and-split tasks, exclusive: true, exhaustive: true, reporting_status: reported, notes: 'Mixed, Human, and Human-cell are all active.'}
    - {id: flip-active-comparison-tasks, label: Active performance-comparison splits, count: 13, basis: dataset-and-split tasks, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'Current official repository semaphore marks all original splits active except the two sampled splits.'}
    - {id: flip-discourse-sampled-tasks, label: Sampled discourse splits, count: 2, basis: dataset-and-split tasks, exclusive: false, exhaustive: false, reporting_status: reported, notes: 'AAV Sampled and GB1 Sampled are orange: the repository warns against performance comparisons because random sampling can overestimate performance.'}
coverage_notes:
  - {tag: protein-protein-binding, coverage: explicitly-in-scope, count: 5, reporting_status: reported, notes: 'All five GB1 dataset-split tasks predict the fitness of an immunoglobulin-binding protein domain; this is task count, not a distinct set of five assays.'}
  - {tag: protein-design, coverage: explicitly-in-scope, count: null, reporting_status: not_reported, notes: 'All tasks are motivated by protein engineering, but FLIP evaluates prediction/regression rather than sequence generation or optimization and does not publish a separate design-task count.'}
access:
  level: fully-open
  tasks: All original AAV, GB1, and Meltome split CSVs and split definitions are public.
  artifacts: The official repository publishes processed split archives, preprocessing notebooks, baseline code, and dataset-specific documentation.
  grader: Deterministic Spearman correlation and mean-squared-error calculations are implemented in the public baseline code.
  license: 'AFL-3.0 for FLIP code and derived task files; original GB1 data are CC BY 4.0; AAV and Meltome were obtained with creator permission.'
  biosafety_notes: 'AAV concerns capsid viability for gene-therapy research. This registry mirrors no sequences, measurements, or model outputs.'
resources:
