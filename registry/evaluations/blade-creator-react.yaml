entity_type: evaluation_run
id: blade-creator-react
work_id: blade-paper
benchmark_id: blade-analysis-generation
benchmark_version: arXiv v3
model_ids: [blade-mixtral-8x22b-unversioned, blade-gpt35-turbo-unversioned, blade-gpt4o-unversioned, blade-gemini-1-5-pro-unversioned, blade-claude-3-5-sonnet-20240620]
scope: {type: full, n: 12, subset_id: null, filter: 'All twelve BLADE research-question/dataset pairs in the ReAct notebook-agent setting.', reporting_status: reported}
protocol:
  shots: {value: one-shot ReAct trajectory, reporting_status: reported, notes: The public prompt includes one Thought-Action-Observation example.}
  turns: {value: multi-turn, reporting_status: reported, notes: At most ten Thought-Action-Observation steps followed by a final analysis.}
  system_prompt_public: {value: true, reporting_status: reported, notes: The full ReAct and output-format prompts are published in the appendix and repository.}
  reasoning: {value: 'ReAct loop with full prior thought, action, and observation context', reporting_status: reported, notes: The model can finish early; otherwise a final completion is requested after ten steps.}
  tools:
    browser: {value: false, reporting_status: reported, notes: The agent exposes only the computational notebook action.}
    internet: {value: false, reporting_status: reported, notes: No network tool is described or exposed by the published agent.}
    databases: {value: false, reporting_status: reported, notes: No external database tool is exposed.}
    code_execution: {value: true, reporting_status: reported, notes: Each Action executes a new Python cell and returns the last-line output as the Observation.}
    container: {value: true, reporting_status: reported, notes: 'The paper describes a sandbox notebook using Python 3.10 with pandas, sklearn, scipy, statsmodels, NumPy, Matplotlib, and seaborn.'}
    external_tools: {value: computational notebook cell execution, reporting_status: reported, notes: The underlying dataset is mounted in the notebook environment.}
  token_budget: {value: null, reporting_status: not_reported, notes: No per-run token limit is reported; candidate models needed at least an 8k context window.}
  time_budget: {value: maximum 10 agent steps, reporting_status: reported, notes: No wall-clock limit is reported.}
  temperature: {value: 0.8, reporting_status: reported, notes: Used to encourage diverse valid analysis decisions across repeated runs.}
  seed: {value: null, reporting_status: not_reported, notes: No random seed is reported.}
  repeats: {value: 20, reporting_status: reported, notes: Twenty independent agent trajectories per model and source dataset.}
  grader: {type: hybrid automatic executable and decision matching, model: GPT-4o (exact snapshot not reported), human_review: false, reporting_status: reported}
  statistical: {value: 'For each dataset and decision type, average precision across all runs and coverage@10 feed a harmonic-mean F1; decision-type F1 values are weighted by ground-truth decision counts. Reported F1 is the mean of 1,000 bootstrap resamples with a percentile-derived 95% interval.', reporting_status: reported, notes: 'Run errors receive hit rate zero and remain in coverage. Modeling-decision weighting uses min(|G_model|, 10).'}
  contamination: {value: null, reporting_status: not_reported, notes: No pretraining-contamination or decontamination analysis is reported.}
metrics:
- {metric_id: average-precision, source_label: Average precision, unit: percent, range: [0, 100], higher_is_better: true, aggregation: mean of per-run precision followed by macro averaging across datasets for each decision type, pass_threshold: null, tolerance: GPT-4o semantic matching plus transformation value/graph matching}
- {metric_id: coverage-at-10, source_label: Coverage@10, unit: percent, range: [0, 100], higher_is_better: true, aggregation: ground-truth coverage of the union of ten sampled runs followed by macro averaging across datasets for each decision type, pass_threshold: null, tolerance: run errors count as zero-coverage generations}
- {metric_id: decision-weighted-f1, source_label: Decision-type weighted F1-score, unit: percent, range: [0, 100], higher_is_better: true, aggregation: weighted mean of per-decision-type harmonic means of average precision and coverage@10, pass_threshold: null, tolerance: 1000-run bootstrap mean and 95% interval}
