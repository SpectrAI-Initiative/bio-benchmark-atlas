entity_type: evaluation_run
id: scigym-small-creator-paper
work_id: scigym-paper
benchmark_id: scigym-small
benchmark_version: 2025 release
model_ids: [scigym-gemini-2-5-flash-preview-04-17, scigym-gpt-4-1-mini-2025-04-14, scigym-claude-3-5-haiku-20241022, scigym-gemini-2-5-pro-preview-03-25, scigym-gpt-4-1-2025-04-14, scigym-claude-3-7-sonnet-20250219]
scope: {type: full, n: 137, subset_id: null, filter: 'All 137 systems in the official small split, each having fewer than ten reactions.', reporting_status: reported}
protocol:
  shots: {value: null, reporting_status: not_reported, notes: 'No benchmark-episode shot count is reported. The public prompt contains SBML and tool-usage examples, not a solved SCIGYM instance.'}
  turns: {value: multi-turn, reporting_status: reported, notes: 'ReAct-style Thoughts–Actions–Observations loop with code, experiment, and submit actions.'}
  system_prompt_public: {value: true, reporting_status: reported, notes: 'System prompt, experiment manual, customized function documentation, and output formats are published in the paper appendix and creator repository.'}
  reasoning: {value: 'ReAct-style Thoughts–Actions–Observations agent; no provider reasoning-effort control is reported.', reporting_status: reported, notes: 'The agent must state thoughts before actions and is not shown the evaluation metrics.'}
  tools:
    browser: {value: false, reporting_status: reported, notes: 'No browser is exposed.'}
    internet: {value: false, reporting_status: reported, notes: 'No network access is exposed during an episode.'}
    databases: {value: false, reporting_status: reported, notes: 'The BioModels source is curated before evaluation; the agent has no live database tool.'}
    code_execution: {value: true, reporting_status: reported, notes: 'Stateful Python shell for analysis and SBML construction.'}
    container: {value: null, reporting_status: not_reported, notes: 'The sources describe a Python execution environment but do not report container isolation.'}
    external_tools: {value: [Tellurium, libRoadRunner, libSBML, pandas, numpy, SCIGYM experiment API], reporting_status: reported, notes: 'Initial-concentration perturbations are simulated from the hidden reference model and returned as pandas time-series data.'}
  token_budget: {value: 'maximum 8,192 output tokens per model response', reporting_status: reported, notes: 'The public evaluation-era LLM wrapper initializes max_length=8192.'}
  time_budget: {value: 'maximum 20 action iterations plus up to 3 invalid-submission debugging iterations', reporting_status: reported, notes: 'An agent may submit earlier; after a malformed or non-simulatable model, up to three additional debugging turns are allowed.'}
  temperature: {value: null, reporting_status: not_reported, notes: 'The main-run temperature is absent from the paper and released trajectories. Example/default repository configs disagree and are not treated as the experimental value.'}
  seed: {value: null, reporting_status: not_reported, notes: 'No model-sampling seed is reported.'}
  repeats: {value: 3, reporting_status: reported, notes: 'The immutable evaluation Parquet contains exactly three rows for every one of the 137 system × 6 model pairs (2,466 total episodes).'}
  grader: {type: deterministic SBML structural and simulation evaluator, model: null, human_review: false, reporting_status: reported}
  statistical: {value: 'Table 1 reports arithmetic means across the small benchmark instances. The public artifact supplies three episodes for every model-system pair; Table 1 does not print confidence intervals.', reporting_status: reported, notes: 'NTS and RMS use precision/recall/F1 matching; STE averages species-level SMAPE and evaluates original and perturbed initial conditions.'}
  contamination: {value: 'Reference models are de-identified by stripping metadata, shuffling components, and replacing component IDs; species names are retained. No model-training decontamination test is reported.', reporting_status: reported, notes: 'This is a task-leakage mitigation, not a formal pretraining-contamination analysis.'}
metrics:
- {metric_id: network-topology-f1, source_label: Network Topology Score (NTS) F1, unit: score, range: [0, 1], higher_is_better: true, aggregation: 'pairwise species-interaction F1 with duplicate relationships counted once, then averaged across systems/episodes', pass_threshold: null, tolerance: 'relationship type includes reactant-product, reactant-modifier, and modifier-product'}
- {metric_id: simulation-trajectory-error, source_label: Simulation Trajectory Error (STE), unit: SMAPE error, range: [0, 1], higher_is_better: false, aggregation: SMAPE averaged across species and benchmark systems/episodes, pass_threshold: null, tolerance: evaluated under original and perturbed initial conditions}
- {metric_id: reaction-matching-with-modifiers-precision, source_label: RMS with modifiers — Precision, unit: score, range: [0, 1], higher_is_better: true, aggregation: exact reactant/product/modifier reaction matching averaged across systems/episodes, pass_threshold: null, tolerance: 'reactants, products, and modifiers must match'}
- {metric_id: reaction-matching-with-modifiers-recall, source_label: RMS with modifiers — Recall, unit: score, range: [0, 1], higher_is_better: true, aggregation: exact reactant/product/modifier reaction matching averaged across systems/episodes, pass_threshold: null, tolerance: 'reactants, products, and modifiers must match'}
- {metric_id: reaction-matching-with-modifiers-f1, source_label: RMS with modifiers — F1, unit: score, range: [0, 1], higher_is_better: true, aggregation: harmonic mean of with-modifier reaction precision and recall averaged across systems/episodes, pass_threshold: null, tolerance: 'reactants, products, and modifiers must match'}
- {metric_id: reaction-matching-without-modifiers-precision, source_label: RMS without modifiers — Precision, unit: score, range: [0, 1], higher_is_better: true, aggregation: exact reactant/product reaction matching averaged across systems/episodes, pass_threshold: null, tolerance: modifiers are ignored}
- {metric_id: reaction-matching-without-modifiers-recall, source_label: RMS without modifiers — Recall, unit: score, range: [0, 1], higher_is_better: true, aggregation: exact reactant/product reaction matching averaged across systems/episodes, pass_threshold: null, tolerance: modifiers are ignored}
- {metric_id: reaction-matching-without-modifiers-f1, source_label: RMS without modifiers — F1, unit: score, range: [0, 1], higher_is_better: true, aggregation: harmonic mean of without-modifier reaction precision and recall averaged across systems/episodes, pass_threshold: null, tolerance: modifiers are ignored}
